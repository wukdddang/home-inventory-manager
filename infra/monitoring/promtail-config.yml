server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker 컨테이너 로그 수집 ──
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # 컨테이너 이름을 라벨로 추가
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # him- 접두사 컨테이너만 수집 (him-backend, him-postgres 등)
      - source_labels: ["__meta_docker_container_name"]
        regex: "/him-.*"
        action: keep
      # Docker Compose 서비스명 라벨
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      # 프로젝트명 라벨
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "project"
    pipeline_stages:
      # JSON 로그 파싱 (NestJS는 기본적으로 JSON 로그 출력)
      - json:
          expressions:
            level: level
            message: message
            context: context
            timestamp: timestamp
      # 파싱 실패 시 원본 유지 (PostgreSQL 등 비-JSON 로그)
      - match:
          selector: '{container=~"him-backend.*"}'
          stages:
            - json:
                expressions:
                  level: level
            - labels:
                level:
