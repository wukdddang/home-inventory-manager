# PLG 스택 (Promtail + Loki + Grafana)
# 사용법: docker compose -f infra/monitoring/docker-compose.monitoring.yml up -d

services:
  loki:
    image: grafana/loki:3.4.2
    container_name: him-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - him-loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.4.2
    container_name: him-promtail
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    mem_limit: 128m
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.6.0
    container_name: him-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: https://grafana.yourdomain.com
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - him-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    mem_limit: 256m
    depends_on:
      loki:
        condition: service_healthy

volumes:
  him-loki-data:
  him-grafana-data:
